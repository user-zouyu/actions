name: remote ssh command 1
on:
  push:
    branch:
      - main
    tags: "v*"
jobs:

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag zouyu99/actions:${{github.ref_name}}
      - name: Push the Docker image
        run: |
          docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
          docker push zouyu99/actions:${{github.ref_name}}
  Deploy:
    steps:
      - name: echo
      - name: 部署镜像
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
            docker pull zouyu99/actions:${{github.ref_name}}
            docker run -it --name actions -p "8080:8080" zouyu99/actions:${{github.ref_name}}
            
